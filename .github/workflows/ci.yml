on:
  push:
  pull_request:

name: CI

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - name: Code
        uses: actions/checkout@v6
      - name: Install Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.x'
      - name: Check diff between gofmt and code
        run: diff <(gofmt -d .) <(echo -n)

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go-version: ['1.25.x', '1.26.x']
    steps:
      - name: Code
        uses: actions/checkout@v6
      - name: Install Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}
      - run: go test -v -race ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Code
        uses: actions/checkout@v6
      - name: Install Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.x'
      - name: Go vet
        run: go vet -x ./...

      - name: GolangCI-Lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12
          only-new-issues: true
